version: "3.8"

services:
  goozfire-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: goozfire-api
    restart: unless-stopped
    ports:
      - "3003:3003"
    environment:
      - PORT=3003
      - HOST=0.0.0.0
      - NODE_ENV=production
      - JWT_SECRET=${JWT_SECRET:-change-me-to-a-random-secret-at-least-32-chars}
      - JWT_EXPIRES_IN=7d
      - DATABASE_URL=/data/goozfire.db
      - FIRECRAWL_API_URL=${FIRECRAWL_API_URL:-https://fire.v244.net}
      - FIRECRAWL_API_KEY=${FIRECRAWL_API_KEY}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@goozfire.local}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
    volumes:
      - goozfire-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3003/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  goozfire-mcp:
    build:
      context: .
      dockerfile: Dockerfile.mcp
    container_name: goozfire-mcp
    restart: unless-stopped
    ports:
      - "3100:3100"
    environment:
      - MCP_HTTP_PORT=3100
      - MCP_AUTH_TOKEN=${MCP_AUTH_TOKEN:-mcp-secret-token}
      - FIRECRAWL_API_URL=${FIRECRAWL_API_URL:-https://fire.v244.net}
      - FIRECRAWL_API_KEY=${FIRECRAWL_API_KEY}

volumes:
  goozfire-data:
