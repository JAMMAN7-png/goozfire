version: "3.8"

services:
  # SearXNG - self-hosted web search engine
  searxng:
    image: searxng/searxng:latest
    container_name: goozfire-searxng
    ports:
      - "8081:8080"
    volumes:
      - ./searxng/settings.yml:/etc/searxng/settings.yml:ro
      - ./searxng/limiter.toml:/etc/searxng/limiter.toml:ro
    environment:
      - SEARXNG_BASE_URL=http://localhost:8080
    restart: unless-stopped
    networks:
      - goozfire-net

  # Goozway LLM Gateway
  goozway:
    build:
      context: ./goozway
      dockerfile: Dockerfile
    container_name: goozfire-gateway
    ports:
      - "3000:3000"
    volumes:
      - ./goozway/config.yaml:/etc/gateway/config.yaml:ro
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - CEREBRAS_API_KEY=${CEREBRAS_API_KEY}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - CLOUDFLARE_API_TOKEN=${CLOUDFLARE_API_TOKEN}
      - CLOUDFLARE_ACCOUNT_ID=${CLOUDFLARE_ACCOUNT_ID}
      - NOVITA_API_KEY=${NOVITA_API_KEY}
      - CHUTES_API_KEY=${CHUTES_API_KEY}
      - NVIDIA_NIM_API_KEY=${NVIDIA_NIM_API_KEY}
      - OPENCODE_API_KEY=${OPENCODE_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - NANOGPT_API_KEY=${NANOGPT_API_KEY}
      - OLLAMA_API_KEY=${OLLAMA_API_KEY}
      - FIRECRAWL_API_KEY=${FIRECRAWL_API_KEY}
    restart: unless-stopped
    networks:
      - goozfire-net

  # Goozfire API + Dashboard
  goozfire-api:
    build: .
    container_name: goozfire-api
    ports:
      - "3003:3003"
    environment:
      - PORT=3003
      - HOST=0.0.0.0
      - NODE_ENV=production
      - JWT_SECRET=${JWT_SECRET:-change-me-to-a-random-secret-at-least-32-chars}
      - JWT_EXPIRES_IN=7d
      - DATABASE_URL=/data/goozfire.db
      - FIRECRAWL_API_URL=${FIRECRAWL_API_URL:-https://fire.v244.net}
      - FIRECRAWL_API_KEY=${FIRECRAWL_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - GATEWAY_URL=http://goozway:3000
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@goozfire.local}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
    volumes:
      - goozfire-data:/data
    depends_on:
      - goozway
      - searxng
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3003/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - goozfire-net

volumes:
  goozfire-data:

networks:
  goozfire-net:
    driver: bridge
